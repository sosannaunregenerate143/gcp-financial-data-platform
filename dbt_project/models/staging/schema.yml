version: 2

sources:
  - name: raw
    description: Raw financial data ingested via Pub/Sub and Cloud Functions into BigQuery.
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('BQ_RAW_DATASET', 'raw') }}"
    loader: pubsub_cloud_function
    loaded_at_field: ingestion_timestamp
    freshness:
      warn_after: {count: 12, period: hour}
      error_after: {count: 24, period: hour}
    tables:
      - name: raw_revenue_transactions
        description: >
          Raw revenue transaction events published via Pub/Sub.
          Each row represents a single financial transaction with amount in cents.
        columns:
          - name: transaction_id
            description: Unique identifier for the transaction.
          - name: timestamp
            description: ISO 8601 timestamp of when the transaction occurred.
          - name: amount_cents
            description: Transaction amount in cents (integer to avoid floating point issues).
          - name: currency
            description: ISO 4217 currency code (USD, EUR, GBP, JPY).
          - name: customer_id
            description: Unique identifier for the customer.
          - name: product_line
            description: Product line generating the revenue (api_usage, enterprise_license, professional_services).
          - name: region
            description: Geographic region of the transaction (us-east, us-west, eu-west, ap-southeast).
          - name: metadata
            description: JSON string containing additional transaction metadata.
          - name: ingestion_timestamp
            description: Timestamp when the record was ingested into BigQuery.

      - name: raw_usage_metrics
        description: >
          Raw platform usage metric events published via Pub/Sub.
          Tracks API calls, token processing, and compute hours per customer.
        columns:
          - name: metric_id
            description: Unique identifier for the usage metric event.
          - name: timestamp
            description: ISO 8601 timestamp of when the metric was recorded.
          - name: customer_id
            description: Unique identifier for the customer.
          - name: metric_type
            description: Type of usage metric (api_calls, tokens_processed, compute_hours).
          - name: quantity
            description: Numeric value of the metric.
          - name: unit
            description: Unit of measurement for the metric.
          - name: metadata
            description: JSON string containing additional metric metadata.
          - name: ingestion_timestamp
            description: Timestamp when the record was ingested into BigQuery.

      - name: raw_cost_records
        description: >
          Raw cost allocation records published via Pub/Sub.
          Tracks infrastructure and operational costs by cost center and category.
        columns:
          - name: record_id
            description: Unique identifier for the cost record.
          - name: timestamp
            description: ISO 8601 timestamp of when the cost was incurred.
          - name: cost_center
            description: Cost center responsible for the expense.
          - name: category
            description: Cost category (compute, storage, network, personnel).
          - name: amount_cents
            description: Cost amount in cents.
          - name: currency
            description: ISO 4217 currency code.
          - name: description
            description: Free-text description of the cost item.
          - name: metadata
            description: JSON string containing additional cost metadata.
          - name: ingestion_timestamp
            description: Timestamp when the record was ingested into BigQuery.

models:
  - name: stg_revenue_transactions
    description: >
      Cleaned and deduplicated revenue transactions. Timestamps parsed from ISO 8601 strings,
      surrogate key generated from transaction_id.
    columns:
      - name: transaction_id
        description: Unique identifier for the transaction.
        tests:
          - not_null
      - name: event_timestamp
        description: Parsed TIMESTAMP of when the transaction occurred.
        tests:
          - not_null
      - name: event_date
        description: Date extracted from event_timestamp for partitioning and joins.
        tests:
          - not_null
      - name: amount_cents
        description: Transaction amount in cents.
        tests:
          - not_null
      - name: currency
        description: ISO 4217 currency code.
        tests:
          - not_null
          - accepted_values:
              values: ['USD', 'EUR', 'GBP', 'JPY']
      - name: customer_id
        description: Unique identifier for the customer.
        tests:
          - not_null
      - name: product_line
        description: Product line generating the revenue.
        tests:
          - not_null
          - accepted_values:
              values: ['api_usage', 'enterprise_license', 'professional_services']
      - name: region
        description: Geographic region of the transaction.
        tests:
          - not_null
          - accepted_values:
              values: ['us-east', 'us-west', 'eu-west', 'ap-southeast']
      - name: metadata
        description: Raw JSON metadata string from the source event.
      - name: surrogate_key
        description: Deterministic surrogate key derived from transaction_id.
        tests:
          - unique
          - not_null
      - name: ingestion_timestamp
        description: Timestamp of record ingestion into BigQuery.
        tests:
          - not_null
      - name: source_system
        description: Identifier for the ingestion pipeline that produced this record.

  - name: stg_usage_metrics
    description: >
      Cleaned and deduplicated usage metrics. Timestamps parsed from ISO 8601 strings,
      surrogate key generated from metric_id.
    columns:
      - name: metric_id
        description: Unique identifier for the usage metric event.
        tests:
          - not_null
      - name: event_timestamp
        description: Parsed TIMESTAMP of when the metric was recorded.
        tests:
          - not_null
      - name: event_date
        description: Date extracted from event_timestamp for partitioning and joins.
        tests:
          - not_null
      - name: customer_id
        description: Unique identifier for the customer.
        tests:
          - not_null
          - relationships:
              to: ref('stg_revenue_transactions')
              field: customer_id
              severity: warn
      - name: metric_type
        description: Type of usage metric being tracked.
        tests:
          - not_null
          - accepted_values:
              values: ['api_calls', 'tokens_processed', 'compute_hours']
      - name: quantity
        description: Numeric value of the metric.
        tests:
          - not_null
      - name: unit
        description: Unit of measurement for the metric quantity.
        tests:
          - not_null
      - name: metadata
        description: Raw JSON metadata string from the source event.
      - name: surrogate_key
        description: Deterministic surrogate key derived from metric_id.
        tests:
          - unique
          - not_null
      - name: ingestion_timestamp
        description: Timestamp of record ingestion into BigQuery.
        tests:
          - not_null
      - name: source_system
        description: Identifier for the ingestion pipeline that produced this record.

  - name: stg_cost_records
    description: >
      Cleaned and deduplicated cost records. Timestamps parsed from ISO 8601 strings,
      surrogate key generated from record_id.
    columns:
      - name: record_id
        description: Unique identifier for the cost record.
        tests:
          - not_null
      - name: event_timestamp
        description: Parsed TIMESTAMP of when the cost was incurred.
        tests:
          - not_null
      - name: event_date
        description: Date extracted from event_timestamp for partitioning and joins.
        tests:
          - not_null
      - name: cost_center
        description: Cost center responsible for the expense.
        tests:
          - not_null
          - relationships:
              to: ref('cost_center_hierarchy')
              field: cost_center
              severity: warn
      - name: category
        description: Cost category classification.
        tests:
          - not_null
          - accepted_values:
              values: ['compute', 'storage', 'network', 'personnel']
      - name: amount_cents
        description: Cost amount in cents.
        tests:
          - not_null
      - name: currency
        description: ISO 4217 currency code.
        tests:
          - not_null
      - name: description
        description: Free-text description of the cost item.
      - name: metadata
        description: Raw JSON metadata string from the source event.
      - name: surrogate_key
        description: Deterministic surrogate key derived from record_id.
        tests:
          - unique
          - not_null
      - name: ingestion_timestamp
        description: Timestamp of record ingestion into BigQuery.
        tests:
          - not_null
      - name: source_system
        description: Identifier for the ingestion pipeline that produced this record.
